<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" />
    <title>WU Odoo</title>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>

    <!-- ── SPLASH ────────────────────────────────────────────────────────── -->
    <div id="splash-screen">
        <div class="splash-logo">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="55" fill="#714B67"/>
                <text x="50%" y="54%" dominant-baseline="middle"
                      text-anchor="middle" fill="#fff"
                      font-size="28" font-family="Arial,sans-serif" font-weight="bold">WU</text>
                <text x="50%" y="72%" dominant-baseline="middle"
                      text-anchor="middle" fill="#e8d5e0"
                      font-size="13" font-family="Arial,sans-serif">Odoo</text>
            </svg>
        </div>
        <div class="splash-title">WU Odoo</div>
        <div class="splash-subtitle">Mobile Client</div>
        <div class="splash-loader"><div class="loader-bar"></div></div>
    </div>

    <!-- ── HALAMAN KONEKSI ───────────────────────────────────────────────── -->
    <div id="page-connect" class="page hidden">
        <div class="page-header">
            <div class="app-logo-small">
                <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" fill="#714B67"/>
                    <text x="50%" y="55%" dominant-baseline="middle"
                          text-anchor="middle" fill="#fff"
                          font-size="16" font-family="Arial,sans-serif" font-weight="bold">WU</text>
                </svg>
            </div>
            <h1>WU Odoo</h1>
            <p class="subtitle">Masukkan alamat server Odoo Anda</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="input-host">Alamat Server</label>
                <div class="input-with-icon">
                    <span class="input-icon">🌐</span>
                    <input type="text" id="input-host"
                           placeholder="contoh: 157.230.247.220:8069"
                           autocomplete="off" autocorrect="off"
                           autocapitalize="none" spellcheck="false" />
                </div>
                <div class="input-hint">IP atau domain dengan port (contoh: 192.168.1.10:8069)</div>
            </div>

            <div class="protocol-toggle">
                <span class="toggle-label">Protokol:</span>
                <div class="toggle-group">
                    <button id="btn-http"  class="toggle-btn active" data-proto="http">HTTP</button>
                    <button id="btn-https" class="toggle-btn"        data-proto="https">HTTPS</button>
                </div>
            </div>

            <div id="connect-error" class="error-msg hidden"></div>

            <button id="btn-connect" class="btn-primary">
                <span class="btn-text">Sambungkan</span>
                <span class="btn-loader hidden">⏳</span>
            </button>

            <div class="saved-servers-section hidden" id="saved-servers-section">
                <div class="section-title">Server Tersimpan</div>
                <div id="saved-servers-list"></div>
            </div>
        </div>
    </div>

    <!-- ── HALAMAN PILIH DATABASE ────────────────────────────────────────── -->
    <div id="page-database" class="page hidden">
        <div class="page-header">
            <button id="btn-back-to-connect" class="btn-back">← Kembali</button>
            <h2>Pilih Database</h2>
            <p class="subtitle" id="db-server-label"></p>
        </div>

        <div class="form-card">
            <div id="db-loading" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Mengambil daftar database...</p>
            </div>

            <div id="db-error" class="error-msg hidden"></div>

            <div id="db-list" class="db-list hidden"></div>

            <div id="db-manual" class="form-group hidden">
                <label for="input-dbname">Nama Database</label>
                <input type="text" id="input-dbname"
                       placeholder="Masukkan nama database"
                       autocomplete="off" autocapitalize="none" />
                <button id="btn-db-manual-connect" class="btn-primary" style="margin-top:12px">
                    Buka Odoo
                </button>
            </div>
        </div>
    </div>

    <!-- ── ERROR PAGE ────────────────────────────────────────────────────── -->
    <div id="page-error" class="page hidden">
        <div class="error-full">
            <div class="error-icon-big">📡</div>
            <h2>Tidak Ada Koneksi</h2>
            <p>Periksa koneksi internet atau jaringan lokal Anda.</p>
            <button id="btn-error-retry" class="btn-primary">Coba Lagi</button>
        </div>
    </div>

    <!-- ── SIDE MENU (untuk halaman database) ───────────────────────────── -->
    <div id="side-menu" class="side-menu hidden">
        <div class="side-menu-header">
            <div class="side-menu-logo">
                <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" fill="#714B67"/>
                    <text x="50%" y="55%" dominant-baseline="middle"
                          text-anchor="middle" fill="#fff"
                          font-size="16" font-family="Arial,sans-serif" font-weight="bold">WU</text>
                </svg>
            </div>
            <div>
                <div class="side-menu-title">WU Odoo</div>
                <div id="side-menu-server" class="side-menu-server"></div>
            </div>
            <button id="btn-close-menu" class="btn-close-menu">✕</button>
        </div>
    </div>
    <div id="side-menu-overlay" class="side-menu-overlay hidden"></div>

    <script src="cordova.js"></script>
    <script>
    /* ── DEBUG OVERLAY — hidden by default, toggle via burger button ── */
    (function() {
        // Burger button (kiri atas, selalu visible)
        var btn = document.createElement('button');
        btn.id = 'debug-toggle';
        btn.innerHTML = '&#9776;';
        btn.style.cssText = [
            'position:fixed','top:10px','left:10px',
            'width:36px','height:36px',
            'background:rgba(113,75,103,0.85)',
            'color:#fff','border:none','border-radius:8px',
            'font-size:20px','cursor:pointer',
            'z-index:100000','display:flex',
            'align-items:center','justify-content:center',
            'box-shadow:0 2px 8px rgba(0,0,0,0.3)',
            'line-height:1'
        ].join(';');
        document.body.appendChild(btn);

        // Panel log (hidden by default)
        var box = document.createElement('div');
        box.id = 'debug-box';
        box.style.cssText = [
            'position:fixed','bottom:0','left:0','right:0',
            'height:50vh','overflow-y:auto',
            'background:rgba(0,0,0,0.92)','color:#0f0',
            'font-size:11px','font-family:monospace',
            'padding:8px 8px 8px 8px','z-index:99999',
            'white-space:pre-wrap','word-break:break-all',
            'display:none',
            'border-top:2px solid #714B67'
        ].join(';');

        // Header panel log
        var header = document.createElement('div');
        header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;';
        header.innerHTML =
            '<span style="color:#e8d5e0;font-weight:bold;font-size:12px">WU Odoo Debug Log</span>' +
            '<button id="debug-clear" style="background:#714B67;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer">Clear</button>';
        box.appendChild(header);

        var content = document.createElement('div');
        content.id = 'debug-content';
        box.appendChild(content);
        document.body.appendChild(box);

        // Toggle
        var visible = false;
        btn.addEventListener('click', function() {
            visible = !visible;
            box.style.display = visible ? 'block' : 'none';
            btn.style.background = visible ? 'rgba(200,50,50,0.85)' : 'rgba(113,75,103,0.85)';
            if (visible) content.scrollTop = content.scrollHeight;
        });
        document.getElementById('debug-clear').addEventListener('click', function(e) {
            e.stopPropagation();
            lines = [];
            content.innerHTML = '';
        });

        var lines = [];
        function log(type, args) {
            var msg = Array.prototype.slice.call(args).map(function(a) {
                try { return (typeof a === 'object') ? JSON.stringify(a) : String(a); }
                catch(e) { return String(a); }
            }).join(' ');
            var ts    = new Date().toISOString().substr(11,12);
            var color = type==='error'?'#f66': type==='warn'?'#fa0':'#0f0';
            lines.push('<span style="color:'+color+'">['+ts+']['+type.toUpperCase()+'] '+
                msg.replace(/</g,'&lt;')+'</span>');
            if (lines.length > 200) lines.shift();
            content.innerHTML = lines.join('\n');
            if (visible) content.scrollTop = content.scrollHeight;
        }

        var _log   = console.log.bind(console);
        var _warn  = console.warn.bind(console);
        var _error = console.error.bind(console);
        console.log   = function() { _log.apply(console,arguments);   log('log',  arguments); };
        console.warn  = function() { _warn.apply(console,arguments);  log('warn', arguments); };
        console.error = function() { _error.apply(console,arguments); log('error',arguments); };

        window.onerror = function(msg, src, line, col) {
            log('error', [msg + ' @ ' + src + ':' + line + ':' + col]);
            return false;
        };
        window.onunhandledrejection = function(e) {
            log('error', ['UnhandledPromise: ' + (e.reason || e)]);
        };

        log('log', ['=== WU Odoo Debug ===']);
        log('log', ['UA: ' + navigator.userAgent.substr(0,60)]);
        log('log', ['cordova defined: ' + (typeof cordova !== 'undefined')]);
        log('log', ['DOM ready, waiting deviceready...']);

        document.addEventListener('deviceready', function() {
            log('log', ['deviceready FIRED ✓']);
            log('log', ['cordova version: ' + (typeof cordova !== 'undefined' ? cordova.version : 'N/A')]);
        }, false);

        setTimeout(function() {
            log('warn', ['3s — deviceready: ' +
                (typeof cordova !== 'undefined' ? 'cordova exists' : 'cordova NOT found')]);
        }, 3000);
        setTimeout(function() {
            log('warn', ['8s — forcing startApp if not started']);
        }, 8000);
    })();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
