name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=/opt/gradle/gradle-8.7" >> $GITHUB_ENV

      - name: Generate icons & splash
        run: |
          mkdir -p res/icon/android res/screen/android
          python3 - <<'PYEOF'
          import struct, zlib
          def make_png(w, h, r, g, b):
              def chunk(n, d):
                  c = struct.pack('>I', len(d)) + n + d
                  return c + struct.pack('>I', zlib.crc32(n+d) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              row  = b'\x00' + bytes([r,g,b]) * w
              idat = zlib.compress(row * h)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',ihdr) + chunk(b'IDAT',idat) + chunk(b'IEND',b'')
          R,G,B = 113,75,103
          for s in [48,72,96,144,192]:
              open(f'res/icon/android/icon-{s}.png','wb').write(make_png(s,s,R,G,B))
          open('res/screen/android/splash.png','wb').write(make_png(1280,1920,R,G,B))
          print('Icons OK')
          PYEOF

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@13

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-statusbar       --save
          cordova plugin add cordova-plugin-splashscreen    --save
          cordova plugin add cordova-plugin-network-information --save
          cordova plugin add cordova-plugin-inappbrowser    --save
          cordova plugin add cordova-plugin-file            --save
          cordova plugin add cordova-plugin-file-transfer   --save

      # edit-config di config.xml handle usesCleartextTraffic
      # Tapi cordova-android@13 kadang butuh namespace android: di config.xml
      # Verifikasi manifest setelah prepare
      - name: Prepare & verify manifest
        run: |
          cordova prepare android
          echo "=== AndroidManifest.xml ==="
          grep -E "usesCleartextTraffic|networkSecurityConfig|hardwareAccelerated" \
            platforms/android/app/src/main/AndroidManifest.xml || echo "NOT FOUND — patching manually"

          # Fallback patch jika edit-config tidak bekerja
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          python3 - <<'PYEOF'
          import re, sys
          path = 'platforms/android/app/src/main/AndroidManifest.xml'
          with open(path) as f: content = f.read()
          orig = content
          if 'usesCleartextTraffic' not in content:
              content = re.sub(
                  r'(android:hardwareAccelerated="true")',
                  r'\1 android:usesCleartextTraffic="true"',
                  content, count=1)
              print('Patched: added usesCleartextTraffic')
          else:
              print('OK: usesCleartextTraffic already present')
          if content != orig:
              with open(path,'w') as f: f.write(content)
          # Verify
          with open(path) as f: result = f.read()
          ok = 'usesCleartextTraffic="true"' in result
          print('usesCleartextTraffic in manifest:', ok)
          if not ok:
              print('ERROR: patch failed!')
              sys.exit(1)
          PYEOF

      - name: Build Debug APK
        run: cordova build android --debug
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Show final manifest
        run: |
          echo "=== FINAL AndroidManifest.xml ==="
          cat platforms/android/app/src/main/AndroidManifest.xml

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: cordova build android --release -- --packageType=apk
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-unsigned-apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Sign Release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > wu_odoo.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks wu_odoo.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out wu-odoo-release-signed.apk \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f wu_odoo.keystore

      - name: Upload Signed APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-signed-apk
          path: wu-odoo-release-signed.apk
          retention-days: 30
