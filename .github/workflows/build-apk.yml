name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required for Android build) ───────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Setup Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # ── 5. Generate placeholder icons & splash ───────────────────────────────
      - name: Generate placeholder icons and splash
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          mkdir -p res/icon/android res/screen/android
          for size in 48 72 96 144 192; do
            convert -size ${size}x${size} xc:"#714B67" \
              -fill white -font DejaVu-Sans-Bold \
              -pointsize $((size/3)) -gravity center \
              -annotate 0 "WU" \
              res/icon/android/icon-${size}.png 2>/dev/null || \
            python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import sys
          size = int(sys.argv[1])
          img = Image.new('RGB', (size, size), '#714B67')
          draw = ImageDraw.Draw(img)
          draw.rectangle([0,0,size,size], fill='#714B67')
          img.save('res/icon/android/icon-' + str(size) + '.png')
          " $size 2>/dev/null || \
            cp res/icon/android/.gitkeep res/icon/android/icon-${size}.png || true
          done
          # Splash 1280x1920
          convert -size 1280x1920 xc:"#714B67" \
            -fill white -font DejaVu-Sans-Bold \
            -pointsize 120 -gravity center \
            -annotate 0 "WU Odoo" \
            res/screen/android/splash.png 2>/dev/null || \
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (1280, 1920), '#714B67')
          img.save('res/screen/android/splash.png')
          " 2>/dev/null || true
          echo "Icons generated"

      # ── 6. Install Cordova & dependencies ────────────────────────────────────
      - name: Install Cordova globally
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: npm install

      # ── 6. Add Android platform ──────────────────────────────────────────────
      - name: Add Android platform
        run: cordova platform add android@12 --save

      # ── 7. Install Cordova plugins ───────────────────────────────────────────
      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-network-information
          cordova plugin add cordova-plugin-inappbrowser

      # ── 8. Build DEBUG APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: cordova build android --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 9. Upload Debug APK as artifact ──────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. Build RELEASE APK (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: cordova build android --release -- --packageType=apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-unsigned-apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 11. Sign Release APK (jika ada keystore di secrets) ──────────────────
      - name: Sign Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > wu_odoo.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks wu_odoo.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out wu-odoo-release-signed.apk \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f wu_odoo.keystore

      - name: Upload Signed Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-signed-apk
          path: wu-odoo-release-signed.apk
          retention-days: 30
