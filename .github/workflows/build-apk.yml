name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 ─────────────────────────────────────────────────────
      # cordova-android@13 butuh Java 17, Gradle 8.x
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Node.js 20 ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Setup Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 5. Pin Gradle 8.7 (fix XmlParser error di Gradle 9) ─────────────────
      # Gradle 9 menghapus XmlParser dari Groovy — cordova-android@13 butuh Gradle 8
      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=/opt/gradle/gradle-8.7" >> $GITHUB_ENV

      - name: Verify Gradle version
        run: gradle --version

      # ── 6. Generate placeholder icons & splash ───────────────────────────────
      - name: Generate icons and splash
        run: |
          mkdir -p res/icon/android res/screen/android
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os

          # Icons
          sizes = [48, 72, 96, 144, 192]
          color = (113, 75, 103)
          for size in sizes:
              img = Image.new('RGB', (size, size), color)
              d = ImageDraw.Draw(img)
              img.save(f'res/icon/android/icon-{size}.png')
              print(f'Generated icon-{size}.png')

          # Splash 1280x1920
          img = Image.new('RGB', (1280, 1920), color)
          img.save('res/screen/android/splash.png')
          print('Generated splash.png')
          EOF

      # ── 7. Install Cordova CLI ────────────────────────────────────────────────
      - name: Install Cordova CLI
        run: npm install -g cordova@12

      # ── 8. Install npm dependencies ──────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 9. Add Android platform (cordova-android@13) ─────────────────────────
      # cordova-android@13 = support Gradle 8, targetSdk 34, fix XmlParser
      - name: Add Android platform
        run: cordova platform add android@13

      # ── 10. Install Cordova plugins ──────────────────────────────────────────
      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-network-information
          cordova plugin add cordova-plugin-inappbrowser

      # ── 11. Build DEBUG APK ──────────────────────────────────────────────────
      - name: Build Debug APK
        run: cordova build android --debug

      # ── 12. Upload Debug APK ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Build Release APK (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: cordova build android --release -- --packageType=apk

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-unsigned-apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 14. Sign Release APK (opsional, butuh secrets) ───────────────────────
      - name: Sign Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > wu_odoo.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks wu_odoo.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out wu-odoo-release-signed.apk \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f wu_odoo.keystore

      - name: Upload Signed Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-signed-apk
          path: wu-odoo-release-signed.apk
          retention-days: 30
