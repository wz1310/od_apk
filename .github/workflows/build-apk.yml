name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 ─────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Setup Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 5. Pin Gradle 8.7 ────────────────────────────────────────────────────
      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=/opt/gradle/gradle-8.7" >> $GITHUB_ENV

      - name: Verify Gradle version
        run: gradle --version

      # ── 6. Generate icons & splash ───────────────────────────────────────────
      - name: Generate icons and splash
        run: |
          mkdir -p res/icon/android res/screen/android
          python3 - <<'PYEOF'
          import struct, zlib

          def make_png(width, height, r, g, b):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
              row  = b'\x00' + bytes([r, g, b]) * width
              idat = zlib.compress(row * height)
              png  = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', ihdr)
              png += chunk(b'IDAT', idat)
              png += chunk(b'IEND', b'')
              return png

          R, G, B = 113, 75, 103
          for size in [48, 72, 96, 144, 192]:
              with open(f'res/icon/android/icon-{size}.png', 'wb') as f:
                  f.write(make_png(size, size, R, G, B))
              print(f'icon-{size}.png OK')
          with open('res/screen/android/splash.png', 'wb') as f:
              f.write(make_png(1280, 1920, R, G, B))
          print('splash.png OK')
          PYEOF

      # ── 7. Install Cordova CLI ────────────────────────────────────────────────
      - name: Install Cordova CLI
        run: npm install -g cordova@12

      # ── 8. Install npm dependencies ──────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 9. Add Android platform ──────────────────────────────────────────────
      - name: Add Android platform
        run: cordova platform add android@13

      # ── 10. Install Cordova plugins ──────────────────────────────────────────
      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-statusbar       --save
          cordova plugin add cordova-plugin-splashscreen    --save
          cordova plugin add cordova-plugin-network-information --save
          cordova plugin add cordova-plugin-inappbrowser    --save

      # ── 11. Inject HTTP cleartext config ─────────────────────────────────────
      # PENTING: dilakukan SETELAH semua plugin install dan SEBELUM build
      # supaya Cordova tidak overwrite perubahan ini
      - name: Inject HTTP cleartext (network security config)
        run: |
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          RES_XML="platforms/android/app/src/main/res/xml"

          echo "=== AndroidManifest.xml sebelum patch ==="
          grep -n "application" "$MANIFEST" | head -5

          # 1. Buat network_security_config.xml
          mkdir -p "$RES_XML"
          cat > "$RES_XML/network_security_config.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          XML
          echo "network_security_config.xml created"

          # 2. Patch AndroidManifest.xml
          # Cari baris <application dan tambahkan atribut jika belum ada
          if grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            echo "usesCleartextTraffic already present, skipping"
          else
            # Tambahkan ke baris yang mengandung android:hardwareAccelerated
            sed -i 's|android:hardwareAccelerated="true"|android:hardwareAccelerated="true"\n            android:usesCleartextTraffic="true"\n            android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
            echo "Manifest patched"
          fi

          echo "=== AndroidManifest.xml setelah patch ==="
          grep -n "usesCleartextTraffic\|networkSecurityConfig\|hardwareAccelerated" "$MANIFEST"

      # ── 12. Verify requirements ───────────────────────────────────────────────
      - name: Check Cordova requirements
        run: cordova requirements android || true

      # ── 13. Build DEBUG APK ──────────────────────────────────────────────────
      - name: Build Debug APK
        run: cordova build android --debug -- --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # ── 14. Upload Debug APK ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 15. Build Release APK (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: cordova build android --release -- --packageType=apk
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-unsigned-apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 16. Sign Release APK (opsional) ──────────────────────────────────────
      - name: Sign Release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > wu_odoo.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks wu_odoo.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out wu-odoo-release-signed.apk \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f wu_odoo.keystore

      - name: Upload Signed Release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: wu-odoo-release-signed-apk
          path: wu-odoo-release-signed.apk
          retention-days: 30
